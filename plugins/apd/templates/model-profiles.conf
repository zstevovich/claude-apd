# APD Model Profiles — economy vs quality dial for CC pipeline agents.
#
# Format: profile|role|model|effort   (pipe-separated, # comments ignored)
#
# Roles (resolved by agent file name):
#   default      every agent not matched below (builder class — context-heavy,
#                carries the tier)
#   adversarial  adversarial-reviewer (positional value: fresh context matters
#                more than model tier — may sit one tier BELOW default;
#                never put it ABOVE default while builders run cheap)
#   reviewer     code-reviewer (optional row; falls back to default when absent)
#
# Profiles ship as intent, models are DATA — when a new model generation
# lands, update this table (or override per-project), not the script/skill.
# Per-project override: copy this file to <project>/.apd/model-profiles.conf
# and edit; the project copy wins wholesale when present.
#
# burn   — launch week / critical features: maximum quality, token cost ignored
# cruise — daily default: strong builders, adversarial one tier below
# eco    — small pre-scoped tasks, copy fixes, Lean runs

burn|default|claude-fable-5|high
burn|adversarial|opus|max

cruise|default|opus|xhigh
cruise|adversarial|claude-sonnet-5|max

eco|default|claude-sonnet-5|xhigh
eco|adversarial|claude-sonnet-5|max
