# APD Roles — generic developer-role registry for the team-of-orchestrators model.
#
# Format: role|worktree|default_profile|scope|boundary   (pipe-separated, # comments ignored)
#         scope/boundary are free text but MUST NOT contain a '|'.
#
# Two axes, independent:
#   profile (model-profiles.conf) — HOW STRONG a brain the agents carry (burn/cruise/eco)
#   role    (this file)           — WHICH DOMAIN + WHICH workspace an orchestrator owns
#
# Governing principle: a worktree belongs to PRODUCERS of an artifact, not to
# integrators or operators. A producer role writes its own code toward its own
# PR in an isolated worktree (own branch + own APD pipeline). Integrators
# (master) and shared-plane operators (devops) and read-only roles (debug) work
# from the main checkout — isolation doesn't help them and actively hurts.
#
#   worktree=yes  producer  — gets its own git worktree (run-role, future milestone)
#   worktree=no   operator  — runs in the main checkout
#
# role ≠ agent: a role is a WORKSPACE/DOMAIN; an agent is an EXECUTOR inside the
# pipeline. One role (backend) in its worktree runs a full pipeline that
# dispatches MANY agents (backend-api + database + testing + reviewer + ...).
# This file does NOT name project-specific agents — the role→agent link is via
# scope/boundary paths at scaffold time (a later milestone), not by name.
#
# Roles are DATA: this table ships generic defaults; a project may override the
# whole table via <project>/.apd/roles.conf (the project copy wins wholesale).
# Generic = SUPERSET; a project simply doesn't use the roles it lacks.

# --- Producer roles (worktree) ---
backend|yes|cruise|API and endpoints, business/domain logic, data layer (DB, migrations, repos, models), services and external integrations, backend framework layer (DI, middleware, auth, background jobs, cross-cutting)|no client UIs; defines the contract others consume, does not consume it
frontend|yes|cruise|web UI: components, pages/routes, client state, web-side API consumption, design system/styles, web performance and accessibility|no backend, no mobile, no admin; consumes the contract, does not define it
mobile|yes|cruise|mobile app: screens and navigation, client state, mobile-side API consumption, platform-specific (iOS/Android), offline, push notifications|no backend, no web, no admin
backoffice|yes|cruise|internal/admin UI: management CRUD screens, admin workflow, admin-specific endpoints and permissions|no public frontend/mobile; uses the core domain, does not redefine it (bigger domain change = request to backend via master)
reporting|yes|cruise|analytics and reports as code: reporting modules, aggregation queries, report endpoints/screens, export, BI|reads the transactional domain, does not mutate it; no infra

# --- Operator roles (main checkout, no worktree) ---
devops|no|eco|CI/CD, containerization, infra-as-code, deploy, environments/config, secrets, monitoring setup|no feature code; works on the shared plane from root (a worktree would sever it from the infra it manages)
debug|no|eco|root-cause analysis, reproduction, reading logs/telemetry/code, formulating fix proposals|read-only — no commit, no code change; the fix is carried out by the responsible producer role
master|no|cruise|task decomposition and assignment, brokering cross-role requests, merge/integration into develop, merge ordering, develop as clean base, periodic sync|does not write feature code in the main checkout (else roles rebase under it); orchestrates and integrates, does not produce
