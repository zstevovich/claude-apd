interface:
  display_name: "APD Miro Dashboard"
  short_description: "Update or create the APD pipeline dashboard on a Miro board"
  default_prompt: "Use $apd-miro. The project has MIRO_BOARD_URL set in AGENTS.md and the Miro MCP server is registered. Pull pipeline state with apd:apd_pipeline_state() and historical runs with apd:apd_pipeline_metrics() — compute averages and skip rate from the returned runs list. Then update the 'APD Pipeline Dashboard' frame on the board: a Pipeline Status table (✅/⏳/— per step), a Metrics document (totals, averages, skip rate), and a Recent tasks table (last 5 with durations). Reuse the existing frame — never create a new one each time. Push only after a step completes (state is stable). If MCP auth fails, escalate, don't silently skip."
