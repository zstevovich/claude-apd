interface:
  display_name: "APD TDD"
  short_description: "Red-green-refactor discipline for the APD builder phase"
  default_prompt: "Use $apd-tdd. I'm entering the APD builder phase. Iron law: NO production code without a failing test first. Call apd:apd_list_agents() once to discover which role names exist, then before EVERY file write call apd:apd_guard_write(apd_role='<role>', file_path='<path>') — the server reads scope from .apd/agents/<role>.md itself, so you only pass the role name and target. The arg is named apd_role (not role) to dodge Codex's multi_agent role-mismatch prompt. For each behavior: (1) write one minimal test, (2) run it and watch it fail, (3) write the simplest code that makes it pass, (4) refactor while tests stay green. Never bundle unrelated changes. When the builder is done and every R* criterion has a test, call apd:apd_advance_pipeline('builder')."
