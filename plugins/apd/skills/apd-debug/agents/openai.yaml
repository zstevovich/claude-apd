interface:
  display_name: "APD Debug"
  short_description: "Four-phase systematic debugging before re-running a failed step"
  default_prompt: "Use $apd-debug. A test failed, the build failed, the verifier blocked, or the reviewer flagged something critical. Iron law: NO fixes without root-cause investigation first. Run four phases: (1) Root cause — read the error fully, reproduce, check git diff, trace the data flow; (2) Pattern analysis — find similar working code, list every difference; (3) Hypothesis — state it as a sentence, test with the smallest possible change, one variable at a time; (4) Fix with TDD — failing test that reproduces the bug, minimum change, run apd_verify_step(). If three hypotheses in a row fail, STOP and escalate to me with a summary."
