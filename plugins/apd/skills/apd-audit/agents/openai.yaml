interface:
  display_name: "APD Audit"
  short_description: "Qualitative audit of APD configuration on Codex — beyond apd:apd_doctor"
  default_prompt: "Use $apd-audit. Run apd:apd_doctor() first; if it fails, stop and report. Then audit content quality: every agent under .apd/agents/ checked against frontmatter rules (scope, model, effort) and body rules (FORBIDDEN section, workflow); AGENTS.md has all required sections (Stack, APD, Pipeline, Guardrails, Mandatory skills, Human gate) and zero {{PLACEHOLDER}} values; .codex/config.toml has [mcp_servers.apd] plus eight per-tool approval blocks; apd:apd_ping() answers; .codex/hooks.json wires PreToolUse Bash and SessionStart to live scripts; apd:apd_pipeline_state() runs cleanly; .apd/memory/ files have content. Sort findings into CRITICAL / IMPORTANT / CLEAN. Don't auto-fix — report concrete file:line references and recommend apd cdx init for regeneration."
