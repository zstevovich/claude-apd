<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APD Pipeline Runs — Real-World Results</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap');
:root{
  --bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2a;--border:#252538;
  --text:#c0c0d0;--text-dim:#5a5a70;--text-bright:#e8e8f0;--text-faint:#3a3a4a;
  --purple:#af8fff;--purple-dim:rgba(175,143,255,0.15);
  --green:#66cc66;--green-dim:rgba(102,204,102,0.15);
  --orange:#ff884d;--orange-dim:rgba(255,136,77,0.15);
  --red:#f05050;--blue:#4da6ff;--blue-dim:rgba(77,166,255,0.15);
  --glow-purple:0 0 20px rgba(175,143,255,0.3);
  --glow-green:0 0 20px rgba(102,204,102,0.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;color:var(--text-bright)}

/* HERO — logo + live strip */
.hero{padding:28px 24px 20px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(175,143,255,0.04) 0%,transparent 100%)}
.hero-inner{max-width:1200px;margin:0 auto}
.hero-top{display:flex;align-items:center;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.apd-logo{flex-shrink:0;display:block}
.h1-title{font-family:'Space Grotesk';font-size:22px;font-weight:700;color:var(--text-bright);letter-spacing:-0.5px}
.h1-title::before{content:'';display:inline-block;width:1px;height:20px;background:var(--border);margin-right:18px;vertical-align:middle}
.hero-meta{margin-left:auto;font-size:11px;color:var(--text-dim);letter-spacing:0.3px}
.hero-meta .ver{color:var(--purple)}
.hero-meta .sep{color:var(--border);margin:0 8px}
.strip{display:flex;align-items:flex-end;gap:3px;height:56px;padding:4px 0}
.strip .run{flex:1;min-width:4px;border-radius:2px 2px 0 0;cursor:pointer;transition:opacity 0.15s;position:relative}
.strip .run:hover{opacity:0.8}
.strip .run:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:10px;white-space:nowrap;color:var(--text-bright);z-index:10;margin-bottom:4px}
.strip-axis{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--text-faint);letter-spacing:1px}

.container{max-width:1200px;margin:0 auto;padding:28px 24px}

/* SUMMARY */
.summary{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.purple::before{background:var(--purple);box-shadow:var(--glow-purple)}
.card.green::before{background:var(--green);box-shadow:var(--glow-green)}
.card.orange::before{background:var(--orange)}
.card.blue::before{background:var(--blue)}
.card .lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.card .lbl .spark{width:72px;height:18px}
.card .val{font-family:'Space Grotesk';font-size:38px;font-weight:700;color:var(--text-bright);line-height:1}
.card.small .val{font-size:22px}
.delta{display:inline-block;font-size:10px;margin-top:8px;padding:2px 6px;border-radius:3px;letter-spacing:0.3px}
.delta.down{background:var(--green-dim);color:var(--green)}
.delta.up{background:var(--orange-dim);color:var(--orange)}
.card .det{font-size:11px;color:var(--text-dim);margin-top:4px}
.summary-small{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:40px}
.card.small{padding:14px 16px}

.sec-h{font-family:'Space Grotesk';font-size:16px;font-weight:600;color:var(--text-bright);margin:8px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sec-h .dot{width:7px;height:7px;border-radius:50%;background:var(--purple);box-shadow:var(--glow-purple)}
.sec-h .hint{margin-left:auto;font-family:'JetBrains Mono';font-size:10px;font-weight:400;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.chart-big{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:32px}
.chart-big svg{width:100%;height:220px;display:block}

/* FILTERS + TABLE */
.filter-row{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.chip{font-size:10px;padding:5px 11px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;font-family:'JetBrains Mono';letter-spacing:0.5px;transition:all 0.15s}
.chip:hover{color:var(--text)}
.chip.active{background:var(--purple-dim);border-color:var(--purple);color:var(--purple)}
.filter-spacer{flex:1}
.sort-by{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.tbl{width:100%;border-collapse:collapse;font-size:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.tbl thead th{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);font-weight:500;white-space:nowrap;background:var(--surface);position:sticky;top:0;z-index:5}
.tbl tbody tr{border-bottom:1px solid rgba(37,37,56,0.4);transition:background 0.12s;cursor:pointer}
.tbl tbody tr:hover{background:var(--surface2)}
.tbl tbody tr.expanded{background:var(--surface2)}
.tbl td{padding:12px 14px;vertical-align:middle;white-space:nowrap}
.rid{color:var(--purple);font-weight:500}
.rname{color:var(--text-bright);max-width:260px;overflow:hidden;text-overflow:ellipsis;display:inline-block;vertical-align:middle}
.chev{color:var(--text-faint);font-size:10px;margin-right:6px;display:inline-block;transition:transform 0.15s}
tr.expanded .chev{transform:rotate(90deg);color:var(--purple)}
.pbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500;letter-spacing:0.5px}
.pbadge.net{background:var(--purple-dim);color:var(--purple)}
.pbadge.php{background:var(--blue-dim);color:var(--blue)}
.pbadge.glm{background:rgba(255,200,50,0.15);color:#ffc832}

.pstrip{display:flex;height:14px;border-radius:2px;overflow:hidden;min-width:140px;width:160px;background:#0a0a12}
.pstrip .seg{display:block}
.pstrip .seg.s1{background:var(--purple)}
.pstrip .seg.s2{background:var(--blue)}
.pstrip .seg.s3{background:var(--orange)}
.pstrip .seg.s4{background:var(--green)}
.pstrip .seg:hover{filter:brightness(1.2)}
.ptime{font-size:11px;color:var(--text-dim);margin-left:10px;min-width:56px}

.bz{color:var(--green);font-size:11px}
.bn{color:var(--orange)}
.abadge{font-size:10px;padding:2px 6px;border-radius:3px}
.abadge.real{background:var(--green-dim);color:var(--green)}
.abadge.bypass{background:var(--orange-dim);color:var(--orange)}
.abadge.na{color:var(--text-dim)}
.abadge.optout{background:rgba(77,166,255,0.1);color:var(--blue)}

.ver-m{font-size:10px;color:var(--text-dim);margin-left:8px;letter-spacing:0.3px;white-space:nowrap}
.ver-m::before{content:'◆ ';color:var(--purple);font-size:8px}

/* EXPAND ROW */
.expand-row td{padding:0;background:var(--bg)}
.expand-inner{padding:18px 24px 22px;border-top:1px solid var(--border);display:grid;grid-template-columns:minmax(0,auto) 1fr;gap:24px;align-items:start}
@media(max-width:800px){.expand-inner{grid-template-columns:1fr}}
.report-term{background:#111119;border:1px solid #1c1c2c;border-radius:8px;padding:14px 18px;font-size:11.5px;line-height:1.7;white-space:pre;overflow-x:auto;max-width:100%}
.rv{color:#af8fff}.rvb{color:#af8fff;font-weight:700}
.rdm{color:#3a3a4a}.rgr{color:#7ec87e}.ror{color:#ff8844}
.rbl{color:#5fafff}.ryl{color:#e0af68}.rw{color:#d0d0dd}
.note-full{font-size:12px;color:var(--text);line-height:1.7;max-width:480px}
.note-label{font-size:9px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}

.footer{text-align:center;padding:32px;border-top:1px solid var(--border);margin-top:40px}
.footer a{color:var(--purple);text-decoration:none;font-size:12px}
.footer a:hover{text-decoration:underline}
.footer .sep{color:var(--text-dim);margin:0 12px}

@media(max-width:900px){.summary{grid-template-columns:1fr}.summary-small{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.summary-small{grid-template-columns:1fr}.hero-meta{margin-left:0;width:100%}}
</style>
</head>

// ============ HELPERS ============
function fmtDurShort(s){var m=Math.floor(s/60),c=s%60;return m+'m '+(c<10?'0':'')+c+'s';}
function fmtMin(s){return Math.round(s/60)+'m';}
function parseAdv(a){
  // returns {actionable, total} or null
  var m = /(\d+)\s*\((\d+)\/(\d+)\)/.exec(a);
  if(!m) return null;
  return {actionable:parseInt(m[2],10), total:parseInt(m[1],10)};
}

// ============ SUMMARY STATS ============
(function(){
  var total = runs.length;
  document.getElementById('stat-total').textContent = total;
  var dates = runs.map(function(r){return r.date;});
  var unique = Array.from(new Set(dates)).sort();
  var span = (new Date(unique[unique.length-1]) - new Date(unique[0]))/86400000 + 1;
  var projects = ['PHP project','Loyalty Program','Backoffice/Hangfire','Bambi','MojOff','TinyMCE → TipTap'];
  document.getElementById('stat-total-detail').textContent = projects.length + ' projects · ' + span + ' days';

  var fmtDate = function(s){return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric'});};
  var lastRun = runs[runs.length-1];
  var lastDate = new Date(lastRun.date);
  var lastClean = runs.slice(-10).every(function(r){return r.blocks===0;});
  document.getElementById('hero-meta').innerHTML =
    '<span class="ver">' + (lastRun.ver||'v5.0.0') + '</span><span class="sep">·</span>' +
    fmtDate(unique[0]) + '–' + fmtDate(unique[unique.length-1]) + '<span class="sep">·</span>' +
    (lastClean ? '100% zero-block (last 10)' : 'last run ' + fmtDurShort(lastRun.duration));

  var avgAll = runs.reduce(function(a,r){return a+r.duration;},0)/total;
  var last5 = runs.slice(-5);
  var avgLast5 = last5.reduce(function(a,r){return a+r.duration;},0)/5;
  var prev5 = runs.slice(-10,-5);
  var avgPrev5 = prev5.reduce(function(a,r){return a+r.duration;},0)/5;
  document.getElementById('stat-avg').textContent = fmtMin(avgAll);
  var deltaPct = Math.round((avgLast5-avgPrev5)/avgPrev5*100);
  var dEl = document.getElementById('delta-dur');
  if(deltaPct < 0){ dEl.textContent = '↓ '+Math.abs(deltaPct)+'% vs prev 5'; dEl.className='delta down'; }
  else if(deltaPct > 0){ dEl.textContent = '↑ '+deltaPct+'% vs prev 5'; dEl.className='delta up'; }
  else { dEl.textContent = 'flat vs prev 5'; dEl.className='delta'; }

  var fastest = runs.reduce(function(m,r){return r.duration<m.duration?r:m;},runs[0]);
  var fm = Math.floor(fastest.duration/60), fs = fastest.duration%60;
  document.getElementById('stat-fastest').textContent = fm+':'+String(fs).padStart(2,'0');
  document.getElementById('stat-fastest-detail').textContent = '#'+fastest.id+' · '+fastest.name.split(' ').slice(0,3).join(' ');

  var totalBlocks = runs.reduce(function(a,r){return a+r.blocks;},0);
  var l5blocks = last5.reduce(function(a,r){return a+r.blocks;},0);
  document.getElementById('stat-blocks').textContent = totalBlocks;
  document.getElementById('stat-blocks-detail').textContent = 'last 5: '+l5blocks+' block' + (l5blocks===1?'':'s');

  var advSum={a:0,t:0,peak:{rate:0,id:0}};
  runs.forEach(function(r){
    var p = parseAdv(r.adversarial);
    if(p && p.total > 0){
      advSum.a += p.actionable; advSum.t += p.total;
      var rate = p.actionable/p.total*100;
      if(rate > advSum.peak.rate){ advSum.peak = {rate:Math.round(rate), id:r.id}; }
    }
  });
  var hr = advSum.t>0 ? Math.round(advSum.a/advSum.t*100) : 0;
  document.getElementById('stat-adv').textContent = hr+'%';
  document.getElementById('stat-adv-detail').textContent = 'peak '+advSum.peak.rate+'% · #'+advSum.peak.id;

  var zero = runs.filter(function(r){return r.blocks===0;}).length;

// ============ SPARKLINES ============
function spark(id, vals, color){
  var svg = document.getElementById(id);
  var w=72, h=18, max=Math.max.apply(null,vals), min=Math.min.apply(null,vals);
  var range = max-min || 1;
  var pts = vals.map(function(v,i){
    var x = (i/(vals.length-1))*w;
    var y = h - ((v-min)/range)*(h-2) - 1;
    return x+','+y;
  }).join(' ');
  svg.innerHTML = '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linejoin="round"/>';
}
var last10 = runs.slice(-10);
spark('spark-total', last10.map(function(_,i){return i+1;}), '#af8fff');
spark('spark-dur', last10.map(function(r){return r.duration;}), '#66cc66');

// ============ CHART (duration trend w/ median + version markers) ============
(function(){
  var svg = document.getElementById('duration-chart');
  var W=1100,H=220,pad={t:16,r:20,b:30,l:44};
  var pw=W-pad.l-pad.r, ph=H-pad.t-pad.b;
  var mins = runs.map(function(r){return r.duration/60;});
  // ceiling to nearest 10
  var max = Math.ceil(Math.max.apply(null,mins)/10)*10;
  var step = pw/(mins.length-1);
  var pts = mins.map(function(v,i){return {x:pad.l+i*step, y:pad.t+ph-(v/max)*ph, v:v, r:runs[i]};});
  var sorted = mins.slice().sort(function(a,b){return a-b;});
  var median = sorted[Math.floor(sorted.length/2)];
  var my = pad.t+ph-(median/max)*ph;
  var html = '';
  // grid
  for(var i=0;i<=4;i++){
    var y = pad.t+(i/4)*ph, val = Math.round(max-(i/4)*max);
    html += '<line x1="'+pad.l+'" y1="'+y+'" x2="'+(W-pad.r)+'" y2="'+y+'" stroke="#252538" stroke-width="0.5"/>';
    html += '<text x="'+(pad.l-8)+'" y="'+(y+3)+'" fill="#5a5a70" font-size="9" text-anchor="end" font-family="JetBrains Mono">'+val+'m</text>';
  }
  // median
  html += '<line x1="'+pad.l+'" y1="'+my+'" x2="'+(W-pad.r)+'" y2="'+my+'" stroke="#5a5a70" stroke-width="0.8" stroke-dasharray="3 4"/>';
  html += '<text x="'+(W-pad.r-4)+'" y="'+(my-4)+'" fill="#5a5a70" font-size="9" text-anchor="end" font-family="JetBrains Mono">median '+Math.round(median)+'m</text>';
  // version markers — auto-detect from runs with `ver`
  var seenVers = {};
  runs.forEach(function(r,i){
    if(r.ver && !seenVers[r.ver]){
      seenVers[r.ver] = true;
      var p = pts[i];
      html += '<line x1="'+p.x+'" y1="'+pad.t+'" x2="'+p.x+'" y2="'+(pad.t+ph)+'" stroke="#af8fff" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>';
      html += '<text x="'+(p.x+4)+'" y="'+(pad.t+10)+'" fill="#af8fff" font-size="9" font-family="JetBrains Mono">◆ '+r.ver+'</text>';
    }
  });
  var path = pts.map(function(p,i){return (i===0?'M':'L')+p.x+','+p.y;}).join(' ');
  var area = path+' L'+pts[pts.length-1].x+','+(pad.t+ph)+' L'+pts[0].x+','+(pad.t+ph)+' Z';
  html += '<path d="'+area+'" fill="#af8fff" opacity="0.06"/>';
  html += '<path d="'+path+'" fill="none" stroke="#af8fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>';
  pts.forEach(function(p){
    html += '<circle cx="'+p.x+'" cy="'+p.y+'" r="2.5" fill="#af8fff" opacity="0.85"><title>#'+p.r.id+' '+p.r.name+' · '+Math.round(p.v)+'m</title></circle>';
  });
  [0, Math.floor(runs.length/3), Math.floor(runs.length*2/3), runs.length-1].forEach(function(i){
    if(pts[i]) html += '<text x="'+pts[i].x+'" y="'+(H-8)+'" fill="#5a5a70" font-size="9" text-anchor="middle" font-family="JetBrains Mono">#'+pts[i].r.id+'</text>';
  });
  svg.innerHTML = html;
})();

(function(){
  var fr = document.getElementById('filter-row');

// ============ TABLE ============
var tbody = document.getElementById('tbody');
function renderTable(){
  tbody.innerHTML = '';
  var filter = filters.find(function(f){return f.id===activeFilter;});
  runs.slice().reverse().filter(filter.test).forEach(function(r){
    var tr = document.createElement('tr');
    tr.dataset.id = r.id;
    tr.onclick = function(){ toggle(r.id); };
    var stackLbl = r.stack==='net' ? '.NET' : r.stack==='glm' ? 'GLM-5' : 'PHP';
    var segHTML = r.segs.map(function(s,i){
      return '<span class="seg s'+(i+1)+'" style="width:'+(s*100)+'%" title="'+['Spec','Builder','Reviewer','Verifier'][i]+' ~'+Math.round(s*r.duration)+'s"></span>';
    }).join('');
    var blockCell = r.blocks===0 ? '<span class="bz">✓ 0</span>' : '<span class="bn">'+r.blocks+'</span>';
    var verHTML = r.ver ? '<span class="ver-m">'+r.ver+'</span>' : '';
    tr.innerHTML =
      '<td><span class="chev">▸</span><span class="rid">#'+r.id+'</span></td>'+
      '<td><span class="rname">'+r.name+'</span>'+verHTML+'</td>'+
      '<td><span class="pbadge '+r.stack+'">'+stackLbl+'</span></td>'+
      '<td><div style="display:flex;align-items:center"><div class="pstrip">'+segHTML+'</div><span class="ptime">'+fmtDurShort(r.duration)+'</span></div></td>'+
      '<td style="color:'+(r.spec==='N/A'?'var(--text-dim)':'var(--text)')+'">'+r.spec+'</td>'+
      '<td>'+blockCell+'</td>'+
      '<td><span class="abadge '+r.advType+'">'+r.adversarial+'</span></td>';
    tbody.appendChild(tr);
  });
}

function expand(id){
  // make sure filter allows it; if not, reset
  var r = runs.find(function(x){return x.id===id;});
  if(!r) return;
  var f = filters.find(function(f){return f.id===activeFilter;});
  if(!f.test(r)){
    activeFilter = 'all';
    document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('active', c.dataset.filter==='all');});
    renderTable();
  }
  var tr = tbody.querySelector('tr[data-id="'+id+'"]');
  if(!tr) return;
  if(!tr.classList.contains('expanded')) toggle(id);
  tr.scrollIntoView({block:'center', behavior:'smooth'});
}

function toggle(id){
  var tr = tbody.querySelector('tr[data-id="'+id+'"]');
  if(!tr) return;
  var next = tr.nextSibling;
  if(next && next.classList && next.classList.contains('expand-row')){
    next.remove(); tr.classList.remove('expanded'); return;
  }
  tbody.querySelectorAll('tr.expanded').forEach(function(e){
    e.classList.remove('expanded');
    var n = e.nextSibling;
    if(n && n.classList && n.classList.contains('expand-row')) n.remove();
  });
  tr.classList.add('expanded');
  var r = runs.find(function(x){return x.id===id;});
  var er = document.createElement('tr');
  er.className = 'expand-row';
  var td = document.createElement('td');
  td.colSpan = 7;
  td.innerHTML =
    '<div class="expand-inner">' +
      '<div>' + reportHTML(r) + '</div>' +
      '<div><div class="note-label">Note</div><div class="note-full">' + escapeHTML(r.note) + '</div></div>' +
    '</div>';
  er.appendChild(td);
  tr.parentNode.insertBefore(er, tr.nextSibling);
}

function escapeHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============ INLINE APD REPORT TERMINAL ============
function reportHTML(r){
  var BW = 48;
  var dash = function(n){var s='';for(var i=0;i<n;i++)s+='─';return s;};
  var pad = function(s,w){return s+' '.repeat(Math.max(0,w-s.length));};
  var span = function(cls,txt){return '<span class="'+cls+'">'+txt+'</span>';};
  var row = function(parts){
    var len=0; parts.forEach(function(p){len+=p[1].length;});
    var rp = Math.max(0, BW-len);
    return span('rv','│')+parts.map(function(p){return span(p[0],p[1]);}).join('')+' '.repeat(rp)+span('rv','│');
  };
  var segNames=['spec','builder','reviewer','verifier'];
  var segClasses=['rv','rbl','ror','rgr'];
  var out = '';
  out += span('rv','  ╭'+dash(BW)+'╮') + '\n';
  var title = 'APD Pipeline Report — #'+r.id;
  var tp = Math.floor((BW-title.length)/2), tr2 = BW-tp-title.length;
  out += span('rv','  │')+' '.repeat(tp)+span('rvb',title)+' '.repeat(tr2)+span('rv','│') + '\n';
  out += span('rv','  ├'+dash(BW)+'┤') + '\n';
  var nm = r.name.length>34 ? r.name.substring(0,31)+'...' : r.name;
  out += '  '+row([['rdm',' Task:     '],['rw',nm]]) + '\n';
  out += '  '+row([['rdm',' Status:   '],['rgr','complete']]) + '\n';
  out += '  '+row([['rdm',' Duration: '],['rw',fmtDurShort(r.duration)]]) + '\n';
  if(r.ver) out += '  '+row([['rdm',' APD:      '],['rv',r.ver]]) + '\n';
  out += span('rv','  ├'+dash(BW)+'┤') + '\n';
  out += '  '+row([['rw',' '],['rvb','Pipeline']]) + '\n';
  r.segs.forEach(function(s,i){
    var secT = Math.round(s*r.duration), m=Math.floor(secT/60), sc=secT%60;
    var t = m+'m '+(sc<10?'0':'')+sc+'s';
    out += '  '+row([['rw',' '],[segClasses[i],'✓'],['rw',' '+pad(segNames[i],12)],['rdm',t]]) + '\n';
  });
  out += span('rv','  ├'+dash(BW)+'┤') + '\n';
  out += '  '+row([['rw',' '],['rvb','Quality']]) + '\n';
  out += '  '+row([['rdm',' Spec:     '],['rw',r.spec]]) + '\n';
  out += '  '+row([['rdm',' Adv:      '],[r.advType==='real'?'rgr':r.advType==='bypass'?'ror':'rdm',r.adversarial]]) + '\n';
  out += '  '+row([['rdm',' Blocks:   '],[r.blocks===0?'rgr':'ror',''+r.blocks]]) + '\n';
  out += span('rv','  ╰'+dash(BW)+'╯');
  return '<div class="report-term">'+out+'</div>';
}
