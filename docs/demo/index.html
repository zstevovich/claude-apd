<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APD — 30 Second Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #c8c8d0;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #6a6a7a;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header .tagline {
    font-size: 11px;
    color: #4a4a5a;
    letter-spacing: 1px;
  }

  .terminal {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    width: 100%;
    max-width: 720px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 1px rgba(255,255,255,0.05);
  }

  .terminal-bar {
    background: #1a1a26;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #1e1e2e;
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }

  .terminal-title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: #4a4a5a;
    letter-spacing: 1px;
  }

  .terminal-body {
    padding: 20px;
    min-height: 380px;
    font-size: 13px;
    line-height: 1.7;
    position: relative;
    overflow-y: auto;
  }

  .line {
    opacity: 0;
    transform: translateY(4px);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .line.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.15s, transform 0.15s;
  }

  .prompt { color: #7aa2f7; }
  .cmd { color: #c0caf5; }
  .blocked { color: #f7768e; font-weight: 700; }
  .reason { color: #9d7cd8; }
  .success { color: #9ece6a; font-weight: 700; }
  .info { color: #e0af68; }
  .dim { color: #3a3a4a; }
  .step { color: #7dcfff; }
  .file { color: #bb9af7; }
  .accent { color: #ff9e64; }
  .guard { color: #f7768e; }
  .pipeline { color: #2ac3de; }
  .check { color: #9ece6a; }
  .summary { color: #c0caf5; }

  @keyframes blink { 50% { opacity: 0; } }

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    align-items: center;
  }

  button {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    border: 1px solid #2a2a3a;
    border-radius: 6px;
    background: #16161e;
    color: #9a9aaa;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  button:hover {
    background: #1e1e2e;
    border-color: #7aa2f7;
    color: #c0caf5;
  }

  button.primary {
    background: #1a1a3a;
    border-color: #7aa2f7;
    color: #7aa2f7;
  }

  button.primary:hover {
    background: #7aa2f7;
    color: #0a0a0f;
  }

  .phase-indicator {
    font-size: 11px;
    color: #3a3a4a;
    letter-spacing: 1px;
  }

  .phase-indicator.active { color: #7aa2f7; }

  .spacer { height: 10px; }

  .progress-bar {
    width: 100%;
    max-width: 720px;
    height: 2px;
    background: #1e1e2e;
    border-radius: 1px;
    margin-top: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: #7aa2f7;
    width: 0%;
    transition: width 0.3s;
    border-radius: 1px;
  }

  .footer {
    margin-top: 32px;
    text-align: center;
    font-size: 11px;
    color: #3a3a4a;
  }

  .footer a {
    color: #7aa2f7;
    text-decoration: none;
  }

  .footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>Agent Pipeline Development</h1>
  <div class="tagline">what happens when AI agents meet mechanical discipline</div>
</div>

<div class="terminal">
  <div class="terminal-bar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="terminal-title">claude-code &mdash; apd-demo</div>
  </div>
  <div class="terminal-body" id="body">
    <div class="line visible" style="color:#3a3a4a">Press Play to start the demo...</div>
  </div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progress"></div></div>

<div class="controls">
  <button class="primary" id="playBtn">&#9654; Play Demo</button>
  <button id="resetBtn">&#8634; Reset</button>
  <span class="phase-indicator" id="phaseLabel"></span>
</div>

<div class="footer">
  <a href="https://github.com/zstevovich/claude-apd">github.com/zstevovich/claude-apd</a>
</div>

<script>
const bodyEl = document.getElementById('body');
const progressEl = document.getElementById('progress');
const phaseLabelEl = document.getElementById('phaseLabel');
const playBtnEl = document.getElementById('playBtn');
const resetBtnEl = document.getElementById('resetBtn');
let timeoutIds = [];
let lineIdx = 0;

// Scene data uses only text content, CSS classes handle styling
const scenes = [
  { phase: "Phase 1 \u2014 Without discipline", lines: [
    { cls: "dim", text: "\u2500\u2500 Agent tries to commit directly \u2500\u2500" },
    { delay: 600 },
    { parts: [{cls:"prompt",text:"builder-agent $"},{cls:"cmd",text:" git commit -m \"feat: add login\""}] },
    { delay: 800 },
    { cls: "blocked", text: "\u26d4 BLOCKED: guard-git.sh" },
    { cls: "reason", text: "   Commit without APD_ORCHESTRATOR_COMMIT=1 prefix." },
    { cls: "reason", text: "   Only the orchestrator may commit." },
    { delay: 400 },
    { cls: "dim", text: "\u2500\u2500 Agent tries mass staging \u2500\u2500" },
    { delay: 500 },
    { parts: [{cls:"prompt",text:"builder-agent $"},{cls:"cmd",text:" git add ."}] },
    { delay: 600 },
    { cls: "blocked", text: "\u26d4 BLOCKED: guard-git.sh" },
    { cls: "reason", text: "   Mass staging not allowed. Add files explicitly." },
    { delay: 400 },
    { cls: "dim", text: "\u2500\u2500 Agent writes outside scope \u2500\u2500" },
    { delay: 500 },
    { parts: [{cls:"prompt",text:"builder-agent $"},{cls:"cmd",text:" Write \u2192 apps/frontend/App.tsx"}] },
    { delay: 600 },
    { cls: "blocked", text: "\u26d4 BLOCKED: guard-scope.sh" },
    { cls: "reason", text: "   File apps/frontend/App.tsx is outside allowed scope." },
    { cls: "reason", text: "   Allowed paths: src/ tests/" },
    { delay: 400 },
    { cls: "dim", text: "\u2500\u2500 Agent tries to read secrets \u2500\u2500" },
    { delay: 500 },
    { parts: [{cls:"prompt",text:"builder-agent $"},{cls:"cmd",text:" Read \u2192 .env.production"}] },
    { delay: 600 },
    { cls: "blocked", text: "\u26d4 BLOCKED: guard-secrets.sh" },
    { cls: "reason", text: "   Access to sensitive files is not permitted." },
    { delay: 900 },
    { cls: "guard", text: "   4 blocks logged to guard-audit.log" },
    { delay: 1200 },
  ]},
  { phase: "Phase 2 \u2014 With APD pipeline", lines: [
    { cls: "dim", text: "\u2500\u2500 The disciplined way \u2500\u2500" },
    { delay: 600 },
    { cls: "pipeline", text: "\u2460 SPEC" },
    { parts: [{cls:"prompt",text:"orchestrator $"},{cls:"cmd",text:" pipeline-advance.sh spec \"User login\""}] },
    { delay: 500 },
    { cls: "check", text: "   \u2713 Spec card created \u2192 user approved" },
    { delay: 700 },
    { cls: "pipeline", text: "\u2461 BUILDER" },
    { parts: [{cls:"prompt",text:"orchestrator $"},{cls:"cmd",text:" dispatch backend-builder"}] },
    { delay: 400 },
    { parts: [{cls:"file",text:"   \u2192 src/Auth/LoginHandler.cs"},{cls:"dim",text:" (3 edits)"}] },
    { parts: [{cls:"file",text:"   \u2192 tests/Auth/LoginTests.cs"},{cls:"dim",text:" (1 edit)"}] },
    { cls: "check", text: "   \u2713 Builder complete \u2014 scope clean, 0 blocks" },
    { delay: 700 },
    { cls: "pipeline", text: "\u2462 REVIEWER" },
    { parts: [{cls:"prompt",text:"orchestrator $"},{cls:"cmd",text:" dispatch code-reviewer"}] },
    { delay: 500 },
    { cls: "info", text: "   \u26a0 Nullable field Email missing null-check in DTO" },
    { cls: "check", text: "   \u2713 Builder fixed \u2192 Reviewer approved" },
    { delay: 700 },
    { cls: "pipeline", text: "\u2463 VERIFIER" },
    { parts: [{cls:"prompt",text:"orchestrator $"},{cls:"cmd",text:" verify-all.sh"}] },
    { delay: 500 },
    { cls: "check", text: "   \u2713 dotnet build \u2014 OK" },
    { cls: "check", text: "   \u2713 dotnet test \u2014 47 passed, 0 failed" },
    { cls: "check", text: "   \u2713 Cross-layer types \u2014 DTO \u2194 TS match" },
    { delay: 900 },
    { parts: [{cls:"prompt",text:"orchestrator $"},{cls:"cmd",text:" APD_ORCHESTRATOR_COMMIT=1 git commit -m \"feat: user login\""}] },
    { delay: 600 },
    { cls: "success", text: "\u2705 Commit successful \u2014 pipeline reset \u2014 session-log updated" },
    { delay: 400 },
    { spacer: true },
    { cls: "summary", text: "   8 files \u00b7 4 phases \u00b7 1 fix from review \u00b7 0 skipped steps" },
    { delay: 500 },
    { cls: "dim", text: "   Error \u2192 Rule \u2192 Guardrail. Repeat." },
  ]},
];

function addLine(item) {
  var div = document.createElement('div');
  div.className = 'line';

  if (item.spacer) {
    div.classList.add('spacer');
  } else if (item.parts) {
    item.parts.forEach(function(p) {
      var span = document.createElement('span');
      span.className = p.cls;
      span.textContent = p.text;
      div.appendChild(span);
    });
  } else if (item.cls) {
    var span = document.createElement('span');
    span.className = item.cls;
    span.textContent = item.text;
    div.appendChild(span);
  }

  bodyEl.appendChild(div);
  requestAnimationFrame(function() {
    div.classList.add('visible');
    bodyEl.scrollTop = bodyEl.scrollHeight;
  });
  lineIdx++;
}

function sleep(ms) {
  return new Promise(function(resolve) {
    var id = setTimeout(resolve, ms);
    timeoutIds.push(id);
  });
}

async function playScene(scene, sceneIdx, totalScenes) {
  phaseLabelEl.textContent = scene.phase;
  phaseLabelEl.classList.add('active');

  var totalLines = scene.lines.length;
  for (var i = 0; i < totalLines; i++) {
    var item = scene.lines[i];
    if (item.delay) {
      await sleep(item.delay);
    } else {
      addLine(item);
      var pct = ((sceneIdx / totalScenes) + ((i / totalLines) / totalScenes)) * 100;
      progressEl.style.width = pct + '%';
      await sleep(80);
    }
  }
}

async function startDemo() {
  playBtnEl.disabled = true;
  playBtnEl.textContent = '\u23f5 Playing...';
  bodyEl.textContent = '';
  lineIdx = 0;

  for (var s = 0; s < scenes.length; s++) {
    if (s > 0) {
      addLine({ spacer: true });
      await sleep(800);
    }
    await playScene(scenes[s], s, scenes.length);
  }

  progressEl.style.width = '100%';
  phaseLabelEl.textContent = 'Demo complete';
  playBtnEl.disabled = false;
  playBtnEl.textContent = '\u25b6 Replay';
}

function resetDemo() {
  timeoutIds.forEach(clearTimeout);
  timeoutIds = [];
  bodyEl.textContent = '';
  var initLine = document.createElement('div');
  initLine.className = 'line visible';
  initLine.style.color = '#3a3a4a';
  initLine.textContent = 'Press Play to start the demo...';
  bodyEl.appendChild(initLine);
  progressEl.style.width = '0%';
  phaseLabelEl.textContent = '';
  phaseLabelEl.classList.remove('active');
  playBtnEl.disabled = false;
  playBtnEl.textContent = '\u25b6 Play Demo';
  lineIdx = 0;
}

playBtnEl.addEventListener('click', startDemo);
resetBtnEl.addEventListener('click', resetDemo);
</script>

</body>
</html>
