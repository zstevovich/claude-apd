<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arr-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#af8fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arr-fix" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#f05050" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<g transform="translate(0, 30)" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">

<!-- Spec -->
<rect x="20" y="24" width="72" height="36" rx="18" fill="#af8fff" stroke="#af8fff" stroke-width="0.8"/>
<text x="56" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Spec</text>

<!-- Arrow: Spec → Plan -->
<line x1="92" y1="42" x2="110" y2="42" stroke="#af8fff" stroke-width="0.8" marker-end="url(#arr-v)"/>

<!-- Plan -->
<rect x="114" y="24" width="72" height="36" rx="18" fill="#af8fff" stroke="#af8fff" stroke-width="0.6" stroke-dasharray="3 2"/>
<text x="150" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Plan</text>

<!-- Arrow: Plan → Builder -->
<line x1="186" y1="42" x2="204" y2="42" stroke="#5fafff" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- Builder -->
<rect x="208" y="24" width="78" height="36" rx="18" fill="#5fafff" stroke="#5fafff" stroke-width="0.8"/>
<text x="247" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Builder</text>

<!-- Arrow: Builder → Reviewer -->
<line x1="286" y1="42" x2="310" y2="42" stroke="#ff8844" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- Reviewer -->
<rect x="314" y="24" width="84" height="36" rx="18" fill="#ff8844" stroke="#ff8844" stroke-width="0.8"/>
<text x="356" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Reviewer</text>

<!-- Arrow: Reviewer → Adversarial -->
<line x1="398" y1="42" x2="414" y2="42" stroke="#f05050" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- Adversarial -->
<rect x="418" y="24" width="96" height="36" rx="18" fill="#f05050" stroke="#f05050" stroke-width="0.8"/>
<text x="466" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Adversarial</text>

<!-- Arrow: Adversarial → Verifier -->
<line x1="514" y1="42" x2="530" y2="42" stroke="#7ec87e" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- Verifier -->
<rect x="534" y="24" width="78" height="36" rx="18" fill="#7ec87e" stroke="#7ec87e" stroke-width="0.8"/>
<text x="573" y="44" text-anchor="middle" fill="#fff" font-size="14" font-weight="500">Verifier</text>

<!-- Arrow: Verifier → ✓ -->
<line x1="612" y1="42" x2="628" y2="42" stroke="#af8fff" stroke-width="0.8" marker-end="url(#arr-v)"/>

<!-- Checkmark -->
<rect x="632" y="32" width="24" height="20" rx="10" fill="#af8fff" stroke="#af8fff" stroke-width="0.8"/>
<text x="644" y="44" text-anchor="middle" fill="#fff" font-size="12" font-weight="400">✓</text>

<!-- Fix loop: Reviewer → gate → Builder -->
<path d="M356 60 L356 90 Q356 100 346 100 L257 100 Q247 100 247 90 L247 60" fill="none" stroke="#f05050" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arr-fix)"/>
<rect x="286" y="76" width="40" height="18" rx="9" fill="#f05050" stroke="#f05050" stroke-width="0.5"/>
<text x="306" y="88" text-anchor="middle" fill="#fff" font-size="10" font-weight="400">gate</text>
<text x="302" y="112" text-anchor="middle" fill="#f05050" font-size="12" font-weight="400">fix</text>

<!-- Dots above steps -->
<line x1="56" y1="10" x2="56" y2="24" stroke="#af8fff" stroke-width="0.5"/>
<line x1="247" y1="10" x2="247" y2="24" stroke="#5fafff" stroke-width="0.5"/>
<line x1="356" y1="10" x2="356" y2="24" stroke="#ff8844" stroke-width="0.5"/>
<line x1="466" y1="10" x2="466" y2="24" stroke="#f05050" stroke-width="0.5"/>
<line x1="573" y1="10" x2="573" y2="24" stroke="#7ec87e" stroke-width="0.5"/>

<circle cx="56" cy="8" r="2.5" fill="#af8fff"/>
<circle cx="247" cy="8" r="2.5" fill="#5fafff"/>
<circle cx="356" cy="8" r="2.5" fill="#ff8844"/>
<circle cx="466" cy="8" r="2.5" fill="#f05050"/>
<circle cx="573" cy="8" r="2.5" fill="#7ec87e"/>

</g>
</svg>
