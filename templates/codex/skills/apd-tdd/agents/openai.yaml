interface:
  display_name: "APD TDD"
  short_description: "Red-green-refactor discipline for the APD builder phase"
  default_prompt: "Use $apd-tdd. I'm entering the APD builder phase. Iron law: NO production code without a failing test first. Call apd_list_agents() once, cache the builder scope, and pass that scope list to apd_guard_write(path, scope) before EVERY file write. For each behavior: (1) write one minimal test, (2) run it and watch it fail, (3) write the simplest code that makes it pass, (4) refactor while tests stay green. Never bundle unrelated changes. When the builder is done and every R* criterion has a test, call apd_advance_pipeline('builder')."
